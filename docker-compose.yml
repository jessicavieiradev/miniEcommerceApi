services:
    sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        container_name: sqlserver
        environment:
            ACCEPT_EULA: Y
            MSSQL_SA_PASSWORD: ${BD_PASSWORD}
        ports:
            - "1433:1433"
        volumes:
            - mssql_data:/var/opt/mssql
        networks:
            - private_network
        healthcheck:
            test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${BD_PASSWORD}", "-Q", "SELECT 1", "-No"]
            interval: 10s
            timeout: 5s
            retries: 5

    api:
        image: miniecommerceapi:dev
        build:
            context: ./miniEcommerceApi
            dockerfile: miniEcommerceApi/Dockerfile
        container_name: miniecommerceapi
        ports:
            - "5000:8080"
        environment:
            - ASPNETCORE_ENVIRONMENT=Development
            - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=miniecommercebd;User=sa;Password=${BD_PASSWORD};TrustServerCertificate=True
            - Jwt__SecretKey=${JWT_SECRET}
            - Jwt__Issuer=http://localhost:5000
            - Jwt__Audience=http://localhost:5000
            - Jwt__ExpirationMinutes=60
            - AdminSeed__0__Email=${ADMIN_EMAIL}
            - AdminSeed__0__UserName=${ADMIN_USERNAME}
            - AdminSeed__0__Password=${ADMIN_PASSWORD}
        depends_on:
            sqlserver:
                condition: service_healthy
        networks:
            - private_network

networks:
    private_network:
        driver: bridge

volumes:
    mssql_data: